services:
  db:
    image: docker.io/library/postgres:15
    environment:
      POSTGRES_USER: petbattle
      POSTGRES_PASSWORD: petbattle
      POSTGRES_DB: petbattle
    ports:
      - "5432:5432"

  api:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db:5432/petbattle
      QUARKUS_DATASOURCE_USERNAME: petbattle
      QUARKUS_DATASOURCE_PASSWORD: petbattle
