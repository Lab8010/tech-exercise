<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>猫投票</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #f4f4f5; color: #18181b; }
    body { margin: 0 auto; max-width: 960px; padding: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    article {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgb(0 0 0 / 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    article img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #e4e4e7;
    }
    .body { padding: 0.75rem 1rem 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .body h2 { margin: 0; font-size: 1.1rem; }
    .count { font-size: 0.9rem; color: #52525b; }
    .actions { display: flex; gap: 0.5rem; margin-top: auto; flex-wrap: wrap; }
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.45rem 0.75rem;
      font-size: 0.875rem;
      font-weight: 500;
    }
    button.up { background: #22c55e; color: #fff; }
    button.down { background: #f97316; color: #fff; }
    button:disabled { opacity: 0.5; cursor: wait; }
    .err { color: #dc2626; font-size: 0.875rem; margin-top: 0.5rem; }
    footer { margin-top: 2rem; font-size: 0.75rem; color: #71717a; line-height: 1.4; }
    footer a { color: #3b82f6; }
    .upload {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgb(0 0 0 / 0.08);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .upload h2 { margin: 0 0 0.75rem; font-size: 1.1rem; }
    .upload form { display: flex; flex-direction: column; gap: 0.65rem; max-width: 28rem; }
    .upload label { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.875rem; }
    .upload input[type="text"] { padding: 0.45rem 0.5rem; border: 1px solid #d4d4d8; border-radius: 8px; font-size: 1rem; }
    .upload input[type="file"] { font-size: 0.875rem; }
    .upload button[type="submit"] {
      align-self: flex-start;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    .upload button[type="submit"]:disabled { opacity: 0.5; cursor: wait; }
  </style>
</head>
<body>
  <h1>猫投票</h1>
  <p id="status" class="err" hidden></p>
  <section class="upload" aria-labelledby="upload-heading">
    <h2 id="upload-heading">猫を追加（画像アップロード）</h2>
    <form id="uploadForm">
      <label>名前
        <input type="text" name="name" id="catName" required maxlength="120" placeholder="例: ちび" autocomplete="off">
      </label>
      <label>画像
        <input type="file" name="image" id="catImage" accept="image/*" required>
      </label>
      <button type="submit" id="uploadSubmit">追加する</button>
    </form>
  </section>
  <div id="cats" class="grid" aria-live="polite"></div>
  <footer>
    サンプル写真は <a href="https://commons.wikimedia.org/" rel="noopener">Wikimedia Commons</a> より取得したものです（各ファイルのライセンスは Commons の該当ページを参照）。
  </footer>
  <script>
    const catsEl = document.getElementById('cats');
    const statusEl = document.getElementById('status');
    const uploadForm = document.getElementById('uploadForm');
    const uploadSubmit = document.getElementById('uploadSubmit');

    uploadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      showErr('');
      const name = document.getElementById('catName').value.trim();
      const fileInput = document.getElementById('catImage');
      if (!fileInput.files || fileInput.files.length === 0) {
        showErr('画像ファイルを選んでください。');
        return;
      }
      const file = fileInput.files[0];
      const contentType = file.type && file.type.startsWith('image/') ? file.type : 'image/jpeg';
      uploadSubmit.disabled = true;
      try {
        const b64 = await readFileAsBase64(file);
        const res = await fetch('/cats', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: name,
            imageBase64: b64,
            contentType: contentType
          })
        });
        if (!res.ok) {
          let msg = '追加に失敗しました（HTTP ' + res.status + '）';
          try {
            const j = await res.json();
            if (j.error) msg = j.error;
          } catch (ignore) { /* plain text or empty */ }
          showErr(msg);
          return;
        }
        uploadForm.reset();
        await loadCats();
      } finally {
        uploadSubmit.disabled = false;
      }
    });

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const s = reader.result;
          const i = s.indexOf(',');
          resolve(i >= 0 ? s.slice(i + 1) : s);
        };
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function showErr(msg) {
      statusEl.textContent = msg;
      statusEl.hidden = !msg;
    }

    async function vote(id, down) {
      showErr('');
      const q = down ? '?down=true' : '';
      const res = await fetch('/cats/' + id + '/vote' + q, { method: 'POST' });
      if (!res.ok) {
        showErr('投票に失敗しました（HTTP ' + res.status + '）');
        return;
      }
      await loadCats();
    }

    async function loadCats() {
      showErr('');
      catsEl.innerHTML = '';
      const res = await fetch('/cats');
      if (!res.ok) {
        showErr('猫一覧の取得に失敗しました（HTTP ' + res.status + '）');
        return;
      }
      const cats = await res.json();
      for (const c of cats) {
        const art = document.createElement('article');
        art.innerHTML =
          '<img src="' + c.imagePath + '" alt="" width="320" height="240" loading="lazy">' +
          '<div class="body">' +
          '<h2>' + escapeHtml(c.name) + '</h2>' +
          '<p class="count">得票: <strong>' + Number(c.count) + '</strong></p>' +
          '<div class="actions">' +
          '<button type="button" class="up" data-id="' + c.id + '" data-down="0">＋票</button>' +
          '<button type="button" class="down" data-id="' + c.id + '" data-down="1">−票</button>' +
          '</div></div>';
        catsEl.appendChild(art);
      }
      catsEl.querySelectorAll('button').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          const down = btn.getAttribute('data-down') === '1';
          btn.disabled = true;
          try {
            await vote(id, down);
          } finally {
            btn.disabled = false;
          }
        });
      });
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadCats();
  </script>
</body>
</html>
